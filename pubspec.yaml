name: habitdrill
description: Discipline enforcement app - set orders, break them, train.
publish_to: 'none'
version: 1.0.2+539

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9

  # Firebase & Authentication
  firebase_core: ^3.1.0
  firebase_analytics: ^11.4.2

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications & Alarms
  flutter_local_notifications: ^17.2.2
  android_alarm_manager_plus: ^4.0.2
  permission_handler: ^11.3.1

  # Timezone (for correct local scheduling)
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0

  # Animations
  flutter_animate: ^4.5.2

  # HTTP & API
  http: ^1.2.1
  audioplayers: ^5.2.1
  
  share_plus: ^12.0.1
  path_provider: ^2.1.0

  # UI & Icons
  cupertino_icons: ^1.0.6
  lucide_icons_flutter: ^3.1.14+2

  # Utils
  uuid: ^4.3.3
  shared_preferences: ^2.5.3
  intl: ^0.19.0
  url_launcher: ^6.3.0
  emoji_picker_flutter: ^3.0.0
  
  # In-App Purchases
  in_app_purchase: ^3.1.13

  # Video Player (drill sergeant videos)
  video_player: ^2.8.6

  # Camera & Pose Detection (AI rep counting)
  camera: ^0.10.5+5
  google_mlkit_pose_detection: ^0.14.1
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/images/
    - assets/onboarding/
    - assets/videos/
    - assets/audio/sergeant/

  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Inter-ExtraBold.ttf
  #         weight: 800

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  
  # Android specific
  min_sdk_android: 21
  
  # iOS specific  
  remove_alpha_ios: true
